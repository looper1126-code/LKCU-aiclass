<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 課程教材｜AI 智慧生活應用</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            padding: 20px;
            line-height: 1.6;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff9500, #ff6d00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 20px; }
        
        .week-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .week-tab {
            padding: 12px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .week-tab:hover, .week-tab.active {
            background: linear-gradient(90deg, #ff9500, #ff6d00);
            color: #fff;
            border-color: transparent;
        }
        
        .back-link {
            display: inline-block;
            color: #ff9500;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .back-link:hover { text-decoration: underline; }
        
        .content-box {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            min-height: 400px;
        }
        .content-box h2 { 
            color: #ff9500; 
            margin-bottom: 16px; 
            padding-bottom: 10px; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 1.3em;
        }
        .content-box h3 { 
            color: #fff; 
            margin: 20px 0 10px; 
            font-size: 1.1em;
        }
        .content-box h4 { 
            color: #ccc; 
            margin: 15px 0 8px; 
            font-size: 1em;
        }
        .content-box ul { padding-left: 20px; }
        .content-box li { margin: 6px 0; color: #bbb; }
        .content-box p { color: #ccc; margin: 10px 0; }
        .content-box table { 
            width: 100%; 
            border-collapse: collapse; 
            margin: 15px 0;
            font-size: 14px;
        }
        .content-box td, .content-box th { 
            padding: 10px 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            text-align: left;
        }
        .content-box th { background: rgba(255,149,0,0.2); color: #ff9500; }
        
        .highlight { 
            background: rgba(255,149,0,0.15); 
            padding: 2px 8px; 
            border-radius: 4px; 
            color: #ff9500;
        }
        
        .note {
            color: #888;
            font-size: 0.9em;
            margin-top: 8px;
        }
        
        .loading { text-align: center; padding: 40px; color: #666; }
        .error { color: #ff6b6b; text-align: center; padding: 20px; }
        .pdf-link {
            display: inline-block;
            background: linear-gradient(90deg, #ff9500, #ff6d00);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin: 15px 0;
            font-weight: bold;
        }
        .pdf-link:hover { opacity: 0.9; }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回首頁</a>
        
        <h1>📚 課程教材</h1>
        <p class="subtitle">AI 智慧生活應用｜13週完整教材</p>
        
        <div class="week-tabs">
            <span class="week-tab active" data-week="1">第1週</span>
            <span class="week-tab" data-week="2">第2週</span>
            <span class="week-tab" data-week="3">第3週</span>
            <span class="week-tab" data-week="4">第4週</span>
            <span class="week-tab" data-week="5">第5週</span>
            <span class="week-tab" data-week="6">第6週</span>
            <span class="week-tab" data-week="7">第7週</span>
            <span class="week-tab" data-week="8">第8週</span>
            <span class="week-tab" data-week="9">第9週</span>
            <span class="week-tab" data-week="10">第10週</span>
            <span class="week-tab" data-week="11">第11週</span>
            <span class="week-tab" data-week="12">第12週</span>
            <span class="week-tab" data-week="13">第13週</span>
        </div>
        
        <div class="content-box" id="content">
            <div class="loading">載入中...</div>
        </div>
        
        <footer>
            <p>📚 AI 智慧生活應用課程｜林口社區大學 115年度秋季班</p>
            <p>授課教師：Jerry Kao</p>
        </footer>
    </div>
    
    <script>
    // Week metadata for dates
    const weekDates = {
        1: { date: "9/4", title: "🤖 AI 初體驗：認識 AI、安裝 ChatGPT/Gemini" },
        2: { date: "9/11", title: "🏠 AI 生活管家：查食譜、智慧識圖" },
        3: { date: "9/18", title: "✈️ AI 智慧旅遊：規劃行程" },
        4: { date: "9/25", title: "💬 AI 社交應用：祝福語、防詐" },
        5: { date: "10/2", title: "🎨 AI 修圖：MyEdit、CapCut" },
        6: { date: "10/9", title: "📸 AI 美拍：美圖秀秀" },
        7: { date: "10/16", title: "🎭 LINE 個人貼圖" },
        8: { date: "10/23", title: "🎵 AI 音樂：Suno 創作" },
        9: { date: "10/30", title: "😴 公民教育週（休息）" },
        10: { date: "11/6", title: "✨ 提示詞魔法" },
        11: { date: "11/13", title: "🌐 AI 翻譯：出國應用" },
        12: { date: "11/20", title: "📁 作品整理回顧" },
        13: { date: "11/27", title: "🏆 成果分享會" }
    };

    // GitHub raw URLs for MD files
    const weekUrls = {
        1: "https://raw.githubusercontent.com/looper1126-code/LKCU-aiclass/main/materials/week-01.md",
        2: "https://raw.githubusercontent.com/looper1126-code/LKCU-aiclass/main/materials/week-02.md",
        3: "https://raw.githubusercontent.com/looper1126-code/LKCU-aiclass/main/materials/week-03.md",
        4: "https://raw.githubusercontent.com/looper1126-code/LKCU-aiclass/main/materials/week-04.md",
        5: "https://raw.githubusercontent.com/looper1126-code/LKCU-aiclass/main/materials/week-05.md",
        6: "https://raw.githubusercontent.com/looper1126-code/LKCU-aiclass/main/materials/week-06.md",
        7: "https://raw.githubusercontent.com/looper1126-code/LKCU-aiclass/main/materials/week-07.md",
        8: "https://raw.githubusercontent.com/looper1126-code/LKCU-aiclass/main/materials/week-08.md",
        9: null, // 公民教育週
        10: "https://raw.githubusercontent.com/looper1126-code/LKCU-aiclass/main/materials/week-10.md",
        11: "https://raw.githubusercontent.com/looper1126-code/LKCU-aiclass/main/materials/week-11.md",
        12: "https://raw.githubusercontent.com/looper1126-code/LKCU-aiclass/main/materials/week-12.md",
        13: "https://raw.githubusercontent.com/looper1126-code/LKCU-aiclass/main/materials/week-13.md"
    };

    // Week 9 static content
    const week9Content = `
<h2>第9週｜公民教育週（休息）</h2>
<h3>📅 課程資訊</h3>
<ul>
<li>授課日期：115年10月30日（週五）</li>
<li>本週主題：課程暫停一次</li>
</ul>
<h3>📝 這週可以做什麼？</h3>
<ul>
<li>複習之前所學 1-8 週內容</li>
<li>每天和 AI 聊天 10 分鐘</li>
<li>修一張滿意的照片</li>
<li>完善 LINE 貼圖素材</li>
<li>用 Suno 創作一首歌曲</li>
</ul>
<h3>💡 複習建議</h3>
<p>利用這週沒有上课的时间，好好练习前面学过的 AI 工具，把不熟的地方多加练习，下週继续学习会更顺手！</p>
`;

    // Simple MD to HTML converter
    function mdToHtml(md) {
        let html = md;
        
        // Escape HTML
        html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        
        // Headers
        html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
        html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
        
        // Bold
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        
        // Inline code
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        
        // Lists
        html = html.replace(/^\- (.+)$/gm, '<li>$1</li>');
        html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
        
        // Wrap consecutive li in ul
        html = html.replace(/(<li>.*<\/li>\n?)+/g, function(match) {
            return '<ul>' + match + '</ul>';
        });
        
        // Paragraphs
        html = html.replace(/\n\n+/g, '</p><p>');
        html = '<p>' + html + '</p>';
        
        // Clean up
        html = html.replace(/<p>\s*<\/p>/g, '');
        html = html.replace(/<p>(<h[23]>)/g, '$1');
        html = html.replace(/(<\/h[23]>)<\/p>/g, '$1');
        html = html.replace(/<p>(<ul>)/g, '$1');
        html = html.replace(/(<\/ul>)<\/p>/g, '$1');
        html = html.replace(/<p>(<li>)/g, '$1');
        html = html.replace(/(<\/li>)<\/p>/g, '$1');
        html = html.replace(/<p>(<code>)/g, '$1');
        html = html.replace(/(<\/code>)<\/p>/g, '$1');
        html = html.replace(/<p>(<strong>)/g, '$1');
        html = html.replace(/(<\/strong>)<\/p>/g, '$1');
        
        return html;
    }

    // Tab click
    document.querySelectorAll('.week-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            const week = this.dataset.week;
            
            document.querySelectorAll('.week-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '<div class="loading">載入中...</div>';
            
            if (week === '9') {
                contentDiv.innerHTML = week9Content;
                return;
            }
            
            const url = weekUrls[week];
            if (!url) {
                contentDiv.innerHTML = '<div class="error">教材載入中...</div>';
                return;
            }
            
            fetch(url)
                .then(response => response.text())
                .then(md => {
                    let html = mdToHtml(md);
                    
                    // Add PDF download link
                    const pdfUrl = url.replace('.md', '.pdf').replace('/materials/', '/materials/');
                    const weekNum = week.padStart(2, '0');
                    html = html + '<a class="pdf-link" href="' + pdfUrl + '" target="_blank">📥 下載 PDF 講義</a>';
                    
                    contentDiv.innerHTML = html;
                })
                .catch(err => {
                    contentDiv.innerHTML = '<div class="error">教材載入失敗，請稍後再試</div>';
                });
        });
    });
    
    // Load week 1
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelector('.week-tab[data-week="1"]').click();
    });
    </script>
</body>
</html>
